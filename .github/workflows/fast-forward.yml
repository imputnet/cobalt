name: fast-forward

on:
  issue_comment:
    types: [created, edited]

permissions: {} # Default deny all

jobs:
  fast-forward:
    # Only run if the comment contains the /fast-forward command.
    if: ${{ contains(github.event.comment.body, '/fast-forward')
            && github.event.issue.pull_request }}
    runs-on: ubuntu-latest

    permissions:
      contents: write # Minimal permissions for fast-forward operation
      pull-requests: read

    timeout-minutes: 5 # Prevent runaway jobs

    steps:
      - name: Fast forwarding
        uses: sequoia-pgp/fast-forward@abbab24f3c0f57b2653d8797472ff12dd7cbc0ed # v1.0.0 (SHA pinned for supply chain security)
        with:
          merge: true
          comment: on-error